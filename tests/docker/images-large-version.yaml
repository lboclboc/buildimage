schemaVersion: "999.999.0"
images:
  - name: "harbor.mycompany.com/library/test-image-1"
    directory: "test-image-1"
    dockerFile: "Dockerfile"
    tags:
      # First tag is used to update deployments.
      - "tree-{{treeHash}}"
      - "latest"
    labels:
      - name: com.mydomain.repository
        value: "{{repository}}"
      - name: com.mydomain.commit
        value: "{{commit}}"
      - name: com.mydomain.login
        value: "{{login}}"
    buildArgs:
      - name: "USERNAME"
        value: "root"
    deployments:
      - path: ../deployment/kustomize.yaml
        match: "newTag: tr.*"
        replace: "newTag: tree-{{treeHash}}"

  - name: "harbor.mycompany.com/library/test-image-2"
    directory: "test-image-2"
    tags:
      - "tree-{{treeHash}}"
      - "latest"
    labels:
      - name: com.mydomain.repository
        value: "{{repository}}"
    buildArgs:
      - name: "USERNAME"
        value: "root"

  - name: "harbor.mycompany.com/library/test-image-3"
    directory: "test-image-3"
    tags:
      - "tree-{{treeHash}}"
    deployments:
      - kustomize: ../deployment/kustomize.yaml
        newTag: "tree-{{treeHash}}"

