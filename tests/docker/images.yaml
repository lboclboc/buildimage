schemaVersion: "1.5.0"
images:
  - name: "harbor.mycompany.com/library/test-image-1"
    directory: "test-image-1"
    dockerFile: "Dockerfile"
    tags:
      - "tree-{{treeHash}}"
      - "latest"
    labels:
      - name: com.mydomain.repository
        value: "{{repository}}"
      - name: com.mydomain.commit
        value: "{{commit}}"
      - name: com.mydomain.login
        value: "{{login}}"
    buildArgs:
      - name: "USERNAME"
        value: "root"
    deployments:
      - path: ../deployment/values.yaml
        match: '"{{name}}:tree-.*"'
        replace: '"{{name}}:{{tag}}"'

  - name: "harbor.mycompany.com/library/test-image-2"
    directory: "test-image-2"
    tags:
      - "tree-{{treeHash}}"
      - "latest"
    labels:
      - name: com.mydomain.repository
        value: "{{repository}}"
    buildArgs:
      - name: "USERNAME"
        value: "root"

  - name: "harbor.mycompany.com/library/test-image-3"
    directory: "test-image-3"
    tags:
      - "tree-{{treeHash}}"
    deployments:
      - kustomize: ../deployment/kustomize.yaml
        newTag: "{{tag}}"

  - name: "harbor.mycompany.com/library/test-image-no-deploy-match"
    directory: "test-image-3"
    tags:
      - "tree-{{treeHash}}"
    deployments:
      - path: ../deployment/values.yaml
        match: '"{{name}}:nope-.*"'
        replace: '"{{name}}:{{tag}}"'

  - name: "harbor.mycompany.com/library/test-image-no-kustomize"
    directory: "test-image-3"
    tags:
      - "tree-{{treeHash}}"
    deployments:
      - kustomize: ../deployment/kustomize.yaml
        name: No-such-image
        newTag: "{{tag}}"

  - name: "harbor.mycompany.com/library/test-image-with-target"
    directory: "test-image-3"
    tags:
      - "tree-{{treeHash}}"
    target: "base"
